<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive E-Commerce Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative overflow-x-hidden">

    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="#" class="text-xl font-bold tracking-wider text-gray-900">SHOP<span class="text-indigo-600">MODERN</span></a>
                </div>
                
                <div class="hidden md:flex space-x-8 font-medium text-sm text-gray-600">
                    <a href="#" class="hover:text-indigo-600 transition">Shop All</a>
                    <a href="#" class="hover:text-indigo-600 transition">New Arrivals</a>
                </div>

                <div class="flex items-center">
                    <button onclick="toggleCart()" class="text-gray-600 hover:text-indigo-600 transition relative p-2 focus:outline-none">
                        <i class="fa-solid fa-bag-shopping text-xl"></i>
                        <span id="cart-count" class="absolute top-0 right-0 bg-indigo-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h2 class="text-2xl font-bold tracking-tight text-gray-900 mb-8">Featured Products</h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-10">
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400"><i class="fa-solid fa-shirt text-3xl"></i></div>
                    <h3 class="mt-4 text-sm font-semibold text-gray-700">Minimalist Cotton Tee</h3>
                    <p class="text-sm font-bold text-gray-950 mt-1">$35.00</p>
                </div>
                <button onclick="addToCart('Minimalist Cotton Tee', 35.00)" class="mt-4 w-full bg-gray-900 text-white py-2 rounded-md text-sm font-medium hover:bg-indigo-600 transition">Add to Cart</button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400"><i class="fa-solid fa-glasses text-3xl"></i></div>
                    <h3 class="mt-4 text-sm font-semibold text-gray-700">Acetate Sunglasses</h3>
                    <p class="text-sm font-bold text-gray-950 mt-1">$120.00</p>
                </div>
                <button onclick="addToCart('Acetate Sunglasses', 120.00)" class="mt-4 w-full bg-gray-900 text-white py-2 rounded-md text-sm font-medium hover:bg-indigo-600 transition">Add to Cart</button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400"><i class="fa-solid fa-wallet text-3xl"></i></div>
                    <h3 class="mt-4 text-sm font-semibold text-gray-700">Leather Card Wallet</h3>
                    <p class="text-sm font-bold text-gray-950 mt-1">$45.00</p>
                </div>
                <button onclick="addToCart('Leather Card Wallet', 45.00)" class="mt-4 w-full bg-gray-900 text-white py-2 rounded-md text-sm font-medium hover:bg-indigo-600 transition">Add to Cart</button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400"><i class="fa-solid fa-bottle-water text-3xl"></i></div>
                    <h3 class="mt-4 text-sm font-semibold text-gray-700">Insulated Water Flask</h3>
                    <p class="text-sm font-bold text-gray-950 mt-1">$28.00</p>
                </div>
                <button onclick="addToCart('Insulated Water Flask', 28.00)" class="mt-4 w-full bg-gray-900 text-white py-2 rounded-md text-sm font-medium hover:bg-indigo-600 transition">Add to Cart</button>
            </div>

        </div>
    </main>

    <div id="cart-drawer" class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="text-lg font-bold text-gray-900">Your Cart</h2>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-gray-800 text-xl font-bold p-1">&
