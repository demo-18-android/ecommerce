<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusShop Storefront</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col relative overflow-x-hidden">

    <div id="toast" class="fixed bottom-5 right-5 bg-slate-900 text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center space-x-3 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toast-message">Added to cart!</span>
    </div>

    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="index.html" class="text-xl font-black tracking-wider text-slate-900">NEXUS<span class="text-indigo-600">SHOP</span></a>
            
            <div class="flex-1 max-w-md mx-8 hidden sm:block">
                <div class="relative">
                    <input type="text" id="search-input" oninput="filterProducts()" placeholder="Search products..." class="w-full bg-slate-100 pl-10 pr-4 py-2 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-xs"></i>
                </div>
            </div>

            <button onclick="toggleCart()" class="text-slate-700 hover:text-indigo-600 transition relative p-2 focus:outline-none">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-indigo-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex space-x-2 overflow-x-auto pb-4 mb-8 border-b border-slate-200">
            <button onclick="setCategory('all')" id="filter-all" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold bg-indigo-600 text-white shadow-sm transition">All Products</button>
            <button onclick="setCategory('apparel')" id="filter-apparel" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold bg-white text-slate-600 hover:bg-slate-100 transition border border-slate-200">Apparel</button>
            <button onclick="setCategory('accessories')" id="filter-accessories" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold bg-white text-slate-600 hover:bg-slate-100 transition border border-slate-200">Accessories</button>
            <button onclick="setCategory('gear')" id="filter-gear" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold bg-white text-slate-600 hover:bg-slate-100 transition border border-slate-200">Gear</button>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="cart-drawer" class="fixed inset-y-0 right-0 w-full sm:w-[400px] bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h2 class="text-lg font-bold text-slate-900">Your Drawer Cart</h2>
            <button onclick="toggleCart()" class="text-slate-400 hover:text-slate-800 text-2xl p-2 focus:outline-none">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t bg-slate-50 space-y-3">
            <div class="flex justify-between font-bold text-slate-900 text-lg">
                <span>Total:</span><span id="cart-total">$0.00</span>
            </div>
            <a href="checkout.html" class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-indigo-600 transition block text-center shadow-md">Go To Checkout</a>
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-slate-900 opacity-0 pointer-events-none transition-opacity duration-300 z-30"></div>

    <footer class="bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-400 mt-12">
        &copy; 2026 NEXUSSHOP Client Catalog Interface.
    </footer>

    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentCategory = 'all';

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                return (currentCategory === 'all' || p.category === currentCategory) && p.name.toLowerCase().includes(searchVal);
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400"><i class="fa-solid fa-box-open text-3xl mb-2 block"></i>No matching items located.</div>`;
                return;
            }

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex flex-col justify-between hover:shadow-md transition duration-200 group">
                        <a href="product.html?id=${p.id}" class="block">
                            <div class="w-full h-52 bg-slate-50 rounded-xl overflow-hidden flex items-center justify-center border border-slate-100">
                                <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                            </div>
                            <h3 class="text-sm font-bold text-slate-800 mt-4 group-hover:text-indigo-600 transition">${p.name}</h3>
                            <p class="text-xs text-slate-400 mt-1">${p.color}</p>
                            <p class="text-sm font-extrabold text-slate-900 mt-2">$${p.price.toFixed(2)}</p>
                        </a>
                        <button onclick="addToCart(${p.id})" class="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-xs font-semibold hover:bg-indigo-600 transition">Add to Cart</button>
                    </div>
                `;
            });
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.className = "filter-btn px-4 py-2 rounded-full text-xs font-semibold bg-white text-slate-600 transition border border-slate-200");
            document.getElementById(`filter-${cat}`).className = "filter-btn px-4 py-2 rounded-full text-xs font-semibold bg-indigo-600 text-white shadow-sm transition";
            renderProducts();
        }

        function filterProducts() {
            renderProducts();
        }

        document.addEventListener('DOMContentLoaded', renderProducts);
    </script>
</body>
</html>
