<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-100 h-16 flex items-center px-4 max-w-7xl mx-auto w-full">
        <a href="index.html" class="text-xl font-black text-slate-900 tracking-tight">NEXUS<span class="text-indigo-600">SHOP</span></a>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-12 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <form onsubmit="handlePayment(event)" class="lg:col-span-7 bg-white p-8 rounded-2xl border border-slate-100 space-y-6">
            <h2 class="text-xl font-black">Shipping Details</h2>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs font-bold text-slate-400 block mb-1">First Name</label><input type="text" required class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm focus:outline-indigo-600"></div>
                <div><label class="text-xs font-bold text-slate-400 block mb-1">Last Name</label><input type="text" required class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm focus:outline-indigo-600"></div>
            </div>
            <div><label class="text-xs font-bold text-slate-400 block mb-1">Street Address</label><input type="text" required class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm focus:outline-indigo-600"></div>
            
            <h2 class="text-xl font-black pt-4">Simulated Card Payment</h2>
            <div><label class="text-xs font-bold text-slate-400 block mb-1">Card Number</label><input type="text" required placeholder="4111 2222 3333 4444" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm focus:outline-indigo-600"></div>
            
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 mt-6">Authorize Mock Payment</button>
        </form>

        <div class="lg:col-span-5 bg-white p-8 rounded-2xl border border-slate-100 h-fit space-y-4">
            <h2 class="text-xl font-black">Order Summary</h2>
            <div id="checkout-list" class="divide-y divide-slate-100 max-h-80 overflow-y-auto pr-2 space-y-1"></div>
            <div class="pt-4 border-t border-slate-100 space-y-2 text-sm text-slate-500">
                <div class="flex justify-between"><span>Subtotal</span><span id="sub-val">$0.00</span></div>
                <div class="flex justify-between"><span>Shipping</span><span class="text-emerald-600 font-bold">FREE</span></div>
                <div class="flex justify-between font-black text-slate-900 text-base pt-2 border-t"><span>Total</span><span id="tot-val">$0.00</span></div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkoutList = document.getElementById('checkout-list');
            const localCart = JSON.parse(localStorage.getItem('nexus_cart')) || [];
            
            if(localCart.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            let sub = 0;
            checkoutList.innerHTML = '';
            localCart.forEach(item => {
                const cost = item.price * item.quantity;
                sub += cost;
                checkoutList.innerHTML += `
                    <div class="flex justify-between items-center py-3 text-xs">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-slate-50 rounded-lg overflow-hidden border flex-shrink-0">
                                <img src="${item.image}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <p class="font-bold text-slate-800">${item.name}</p>
                                <p class="text-slate-400 mt-0.5">Qty: ${item.quantity}</p>
                            </div>
                        </div>
                        <span class="font-bold text-slate-900">$${cost.toFixed(2)}</span>
                    </div>`;
            });

            document.getElementById('sub-val').innerText = `$${sub.toFixed(2)}`;
            document.getElementById('tot-val').innerText = `$${sub.toFixed(2)}`;
        });

        function handlePayment(e) {
            e.preventDefault();
            localStorage.removeItem('nexus_cart');
            window.location.href = 'success.html';
        }
    </script>
</body>
</html>
